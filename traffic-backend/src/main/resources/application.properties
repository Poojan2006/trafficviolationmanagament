# ─── Datasource: H2 In-Memory (local / testing) ────────────────────────────
# Uses H2 by default unless DB_URL env var is set (e.g. on Render with Neon PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:h2:mem:traffic_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.defer-datasource-initialization=true

# ─── H2 Console (available at http://localhost:8080/h2-console) ─────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── File uploads ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Load .env file (optional, used locally / on Render) ────────────────────
spring.config.import=optional:file:.env[.properties]

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET_KEY:poojanSecretKey_TrafficViolationManagementSystem_LongStringForSecurity}

# ─── Spring AI / Gemini ──────────────────────────────────────────────────────
spring.ai.google.genai.api-key=${GEMINI_API_KEY:dummy-key}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash