services:
  # Frontend Service
  - type: web
    name: traffic-frontend
    env: docker
    dockerContext: traffic-frontend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: traffic-backend
          property: url

  # Backend Service
  - type: web
    name: traffic-backend
    env: docker
    dockerContext: traffic-backend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*" # Placeholder to break circular dependency. Update this in Render dash later.
