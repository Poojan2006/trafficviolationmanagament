services:
  # Backend Service
  - type: web
    name: traffic-backend
    env: docker
    dockerContext: traffic-backend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*" # Update this in Render dashboard to match your Vercel URL (e.g., https://your-app.vercel.app)
