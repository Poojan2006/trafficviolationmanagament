services:
  # Backend Service
  - type: web
    name: traffic-backend
    env: docker
    dockerContext: ./traffic-backend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false # Set this in Render dashboard (Value from Aiven)
      - key: DB_USERNAME
        sync: false # Set this in Render dashboard
      - key: DB_PASSWORD
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: traffic-frontend
          property: url

  # Frontend Service
  - type: web
    name: traffic-frontend
    env: docker
    dockerContext: ./traffic-frontend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: traffic-backend
          property: url
